name: Android Hello World CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to manually click "Run Workflow" from the GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone the code onto the GitHub runner virtual machine
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # Step 2: Set up the Java Environment (Required for Gradle/Android)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Automatically caches dependencies so future builds take half the time

    # Step 3: Fix script permissions (Crucial! Builds will fail without this)
    - name: Grant Execute Permission to Gradlew
      run: chmod +x ./gradlew

    # Step 4: Run the Gradle task to compile a debug Android application
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # Step 4.5: Calculate the true cryptographic hash of the raw APK file
    - name: Calculate APK SHA256
      run: sha256sum app/build/outputs/apk/debug/app-debug.apk

    # Step 5: Extract the compiled file from the VM so you can download it
    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: hello-world-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 3 # Automatically cleans up storage after 3 days
